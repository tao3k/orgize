name: CI

on:
  pull_request:
  push:
    branches:
      - v0.10

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Configure sccache backend
        run: |
          set -euo pipefail
          if [[ -n "${ACTIONS_CACHE_URL:-}" && -n "${ACTIONS_RUNTIME_TOKEN:-}" ]]; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
            echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> "$GITHUB_ENV"
          fi
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Restore sccache cache (fallback)
        if: ${{ env.SCCACHE_GHA_ENABLED != 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: orgize-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', 'wasm/Cargo.toml', '.github/workflows/ci.yml') }}-${{ github.run_id }}
          restore-keys: |
            orgize-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', 'wasm/Cargo.toml', '.github/workflows/ci.yml') }}-
            orgize-sccache-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'wasm/Cargo.toml', '.github/workflows/ci.yml') }}-
            orgize-sccache-${{ runner.os }}-

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: orgize-ci-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch cargo dependencies
        run: cargo fetch

      - run: |
          cargo fmt --all -- --check
          cargo test --workspace --all-targets --all-features
          cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Save sccache cache (fallback)
        if: ${{ always() && !cancelled() && env.SCCACHE_GHA_ENABLED != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: orgize-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', 'wasm/Cargo.toml', '.github/workflows/ci.yml') }}-${{ github.run_id }}

      - name: sccache summary
        if: ${{ always() }}
        shell: bash
        run: sccache --show-stats || true

  gh-pages:
    if: github.ref == 'refs/heads/v0.10'

    permissions:
      contents: read
      pages: write
      id-token: write

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build
        run: wasm-pack build -t web -d ./dist --out-name orgize ./wasm/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./wasm"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
