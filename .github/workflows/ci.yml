name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - v0.10

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  # External parser fixture lock. Update intentionally when refreshing Org mode
  # compatibility coverage; do not track upstream main in CI.
  ORG_MODE_FIXTURE_REV: b470d813d19e55cb90020649ae076684f1494c3b

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure Windows cargo git paths
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          git config --global core.longpaths true
          echo "CARGO_HOME=D:/c" >> "$GITHUB_ENV"
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"

      - name: Restore Org mode fixture cache
        id: org-mode-cache
        uses: actions/cache/restore@v5
        with:
          path: .data/org-mode
          key: orgize-org-mode-${{ runner.os }}-${{ env.ORG_MODE_FIXTURE_REV }}

      - name: Fetch Org mode fixture
        if: ${{ steps.org-mode-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .data
          git init .data/org-mode
          git -C .data/org-mode remote add origin https://github.com/bzg/org-mode.git
          git -C .data/org-mode fetch --depth=1 origin "$ORG_MODE_FIXTURE_REV"
          git -C .data/org-mode checkout --detach FETCH_HEAD

      - name: Validate Org mode fixture
        shell: bash
        run: |
          set -euo pipefail
          test -f .data/org-mode/doc/org-guide.org
          test -f .data/org-mode/lisp/org-element.el

      - name: Save Org mode fixture cache
        if: ${{ steps.org-mode-cache.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .data/org-mode
          key: orgize-org-mode-${{ runner.os }}-${{ env.ORG_MODE_FIXTURE_REV }}

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Configure sccache backend
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${ACTIONS_CACHE_URL:-}" && -n "${ACTIONS_RUNTIME_TOKEN:-}" ]]; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
            echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> "$GITHUB_ENV"
          fi
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Restore sccache cache (fallback)
        if: ${{ env.SCCACHE_GHA_ENABLED != 'true' }}
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: orgize-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', '.github/workflows/ci.yml') }}-${{ github.run_id }}
          restore-keys: |
            orgize-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', '.github/workflows/ci.yml') }}-
            orgize-sccache-${{ runner.os }}-${{ hashFiles('Cargo.toml', '.github/workflows/ci.yml') }}-
            orgize-sccache-${{ runner.os }}-

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: orgize-ci-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch cargo dependencies
        run: cargo fetch

      - name: Check formatting
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features

      - name: Run clippy
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Save sccache cache (fallback)
        if: ${{ always() && !cancelled() && env.SCCACHE_GHA_ENABLED != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.sccache/
          key: orgize-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', '.github/workflows/ci.yml') }}-${{ github.run_id }}

      - name: sccache summary
        if: ${{ always() }}
        shell: bash
        run: sccache --show-stats || true

  gh-pages:
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: read
      pages: write
      id-token: write

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: https://tao3k.github.io/orgize/

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build
        run: wasm-pack build -t web -d ./dist --out-name orgize ./wasm/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./wasm"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
