<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orgize</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.22.0/ace.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.0/beautify-html.js"></script>

    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      .bordered {
        overflow: auto;
        width: 50%;
        flex: 1;
        display: flex;
        flex-direction: column;
        border: 1px solid #dbdbdb;
        border-radius: 4px;
      }

      #took {
        color: #808080;
        font-size: 14px;
        padding: 0.5em 1em;
      }

      #tabsList {
        align-items: center;
        border-bottom-color: #dbdbdb;
        border-bottom-style: solid;
        border-bottom-width: 1px;
        display: flex;
        flex-grow: 0;
        flex-shrink: 0;
        justify-content: flex-start;
        list-style: none;
        margin: 0;
        padding: 0;
        overflow-x: auto;
      }

      #tabsList span {
        text-align: center;
        color: #4a4a4a;
        padding: 0.5em 1em;
        user-select: none;
        cursor: pointer;
      }

      #spacer {
        flex: 1;
      }

      #tabsList span.is-active {
        color: #485fc7;
      }

      .markdown-body a[data-range] {
        color: #485fc7;
        cursor: pointer;
      }

      .feature-overview {
        padding: 1.25rem 1.5rem;
      }

      .feature-overview h2 {
        margin-top: 0;
      }

      .feature-overview table {
        display: table;
        width: 100%;
      }

      .feature-overview td:first-child {
        white-space: nowrap;
        width: 12rem;
      }
    </style>
  </head>
  <body style="height: 100%; display: flex">
    <div
      style="
        margin: 16px;
        display: flex;
        flex-direction: row;
        flex: 1;
        min-height: 0;
        gap: 16px;
      "
    >
      <div class="bordered">
        <div style="height: 100%" id="editor"></div>
      </div>

      <div class="bordered markdown-body">
        <div id="tabsList">
          <span class="is-active" data-value="html-rendered">
            HTML (rendered)
          </span>
          <span data-value="html">HTML</span>
          <span data-value="markdown">Markdown</span>
          <span data-value="latex">LaTeX</span>
          <span data-value="syntax">Syntax</span>
          <span data-value="semantic">Semantic AST</span>
          <span data-value="traverse">Traverse</span>
          <span data-value="features">Parser Features</span>
          <div id="spacer"></div>
          <div id="took"></div>
        </div>

        <div style="flex: 1; overflow: auto">
          <div id="result"></div>
        </div>
      </div>
    </div>
  </body>

  <script type="module">
    import init, { Org } from "./dist/orgize.js";
    import renderMathInElement from "https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.mjs";

    let org;
    const result = document.getElementById("result");
    const took = document.getElementById("took");

    let type = "html-rendered";

    const editor = ace.edit("editor");
    editor.setTheme("ace/theme/tomorrow");

    // render by type

    const render = () => {
      const startTime = performance.now();

      org.update(editor.session.getValue());

      switch (type) {
        case "html-rendered": {
          const html = injectHeadingClass(org.html());
          result.innerHTML =
            "<div style='padding:1.25rem 1.5rem'>" + html + "</div>";
          renderMathInElement(result, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
              { left: "\\(", right: "\\)", display: false },
              { left: "\\[", right: "\\]", display: true },
              { left: "\\begin{align}", right: "\\end{align}", display: true },
            ],
          });
          break;
        }

        case "html": {
          const html = html_beautify(org.html(), { indent_size: 2 });
          result.innerHTML = "<pre>" + escapeHtml(html) + "</pre>";
          break;
        }

        case "markdown": {
          result.innerHTML = "<pre>" + escapeHtml(org.markdown()) + "</pre>";
          break;
        }

        case "latex": {
          result.innerHTML = "<pre>" + escapeHtml(org.latex()) + "</pre>";
          break;
        }

        case "syntax": {
          const syntax = escapeHtml(org.syntax())
            .split("\n")
            .map((line) =>
              line.replace(
                /([A-Za-z0-9_-]*)\@(\d+)\.\.(\d+)/,
                (text, name, start, end) =>
                  `<b>${name}</b><a data-range="${start}-${end}">@${start}..${end}</a>`
              )
            )
            .join("\n");

          result.innerHTML = "<pre>" + syntax + "</pre>";
          break;
        }

        case "semantic": {
          result.innerHTML = "<pre>" + escapeHtml(org.semantic()) + "</pre>";
          break;
        }

        case "traverse": {
          const syntax = escapeHtml(org.traverse())
            .split("\n")
            .map((line) =>
              line.replace(
                /([A-Za-z0-9_-]*)\@(\d+)\.\.(\d+)/,
                (text, name, start, end) =>
                  `<b>${name}</b><a data-range="${start}-${end}">@${start}..${end}</a>`
              )
            )
            .join("\n");

          result.innerHTML = "<pre>" + syntax + "</pre>";
          break;
        }

        case "features": {
          result.innerHTML = renderFeatureOverview();
          break;
        }
      }

      const finishTime = performance.now();

      took.innerText = "took " + (finishTime - startTime).toFixed(2) + "ms";
    };

    // select token or node range by click

    result.addEventListener("click", (ev) => {
      if (!ev.target.dataset.range) return;

      const [start, end] = ev.target.dataset.range.split("-");

      const startPos = editor.session.doc.indexToPosition(parseInt(start));
      const endPos = editor.session.doc.indexToPosition(parseInt(end));
      const range = new ace.Range(
        startPos.row,
        startPos.column,
        endPos.row,
        endPos.column
      );
      editor.gotoLine(startPos.row, startPos.column, true);
      editor.selection.setRange(range);
    });

    // switch render type

    document.getElementById("tabsList").addEventListener("click", (ev) => {
      const clicked = ev.target.closest("span");

      if (!clicked) return;

      type = clicked.dataset.value;

      document.querySelectorAll("#tabsList span").forEach((el) => {
        if (el === clicked) {
          el.classList.add("is-active");
        } else {
          el.classList.remove("is-active");
        }
      });

      render();
    });

    // utils

    const escapeHtml = (html) =>
      html
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

    const injectHeadingClass = (html) =>
      html.replace(/<h(\d)>/g, (_, l) => `<h${l} class="title is-${l}">`);

    const renderFeatureOverview = () => {
      const rows = [
        [
          "Public parser API",
          "`Org::document()` returns the owned semantic AST; `Org::syntax_document()` keeps the lossless rowan tree available.",
        ],
        [
          "Semantic metadata",
          "Source ranges, line/column annotations, diagnostics, traversal, `map_ann`, and `try_map_ann` are exposed through parser v2.",
        ],
        [
          "Headlines and tasks",
          "Custom TODO/DONE declarations, priorities, tags, planning timestamps, property drawers, anchors, and inlinetasks project into semantic nodes.",
        ],
        [
          "Blocks and tables",
          "Source/example block line numbering, code refs, indentation switches, header args, table formulas, and column alignment rows are modeled.",
        ],
        [
          "Links and targets",
          "Internal links resolve against headlines, `CUSTOM_ID`, org-id `ID`, explicit targets, radio targets, footnotes, and source/example coderefs.",
        ],
        [
          "Objects",
          "Links, timestamps, citations, macros, targets, radio targets, entities, snippets, inline src/call, markup, code, and verbatim are covered.",
        ],
        [
          "Preprocessing",
          "`#+INCLUDE:` and `#+MACRO:` are collected as explicit side tables; macro expansion is opt-in and visible in the Semantic AST tab.",
        ],
        [
          "Export boundary",
          "HTML, Markdown, and LaTeX rendering continue to use the lossless syntax substrate while the semantic AST is available for indexers and future exporters.",
        ],
      ];

      return `
        <div class="feature-overview">
          <h2>Parser v2 Feature Surface</h2>
          <table>
            <tbody>
              ${rows
                .map(
                  ([name, detail]) =>
                    `<tr><td><strong>${escapeHtml(name)}</strong></td><td>${inlineCode(detail)}</td></tr>`
                )
                .join("")}
            </tbody>
          </table>
        </div>
      `;
    };

    const inlineCode = (text) =>
      escapeHtml(text).replace(/`([^`]+)`/g, "<code>$1</code>");

    // init

    init().then(() => {
      org = new Org("");

      editor.session.setValue(`# git hash: ${Org.gitHash}
# build time: ${Org.buildTime}

*Orgize*, a /pure/ =Rust= library for
parsing +Emacs+ _org-mode_ files.

See also:
[[https://github.com/tao3k/orgize][GitHub]] |
[[https://crates.io/crates/orgize][crates.io]] |
[[https://www.npmjs.com/package/orgize][NPM]]

-----

#+TODO: NEXT(n) WAIT(w@/!) | DONE(d) CANCELED(c)
#+MACRO: badge $1 :: $0
#+INCLUDE: "guide.org" :lines "1-12" :minlevel 2

* NEXT Parser v2 semantic AST :demo:
SCHEDULED: <2026-05-10 Sun 09:30-10:30 +1w> DEADLINE: <2026-05-17 Sun -2d>

:END:

Semantic links resolve [[#parser-v2-demo][custom IDs]],
[[id:parser-v2-org-id][org IDs]],

and [[coderef:init][source block coderefs]].

Paragraph with <<target-one>>, <<<Radio Target>>>, Radio Target,
{{{badge(parser, wasm)}}}, [cite:@doe2026; see @roe2026 p. 42],

let answer = 42; // ref:init

| <l>     | <r> |
| Feature | Count |
| links   |     6 |

SCHEDULED: <2026-05-11 Mon>

  to build reliable and efficient software.

    \\hat{f}(\\xi)\\,e^{2 \\pi i \\xi x}
    \\,d\\xi
$$

`);

      editor.session.on("change", () => render());

      render();
    });
  </script>
</html>
